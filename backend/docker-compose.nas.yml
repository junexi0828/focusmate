# ============================================================================
# FocusMate - Docker Compose for Synology NAS (DS223j)
# ============================================================================
#
# 아키텍처: 이미지 기반 배포
# - Code: Docker 이미지에 포함됨 (빌드 시점에 번들링)
# - Env: Docker Container로 격리된 실행 환경 제공
# - Services: Backend + Redis
#
# 사용법:
#   1. 로컬에서 이미지 빌드 & NAS로 전송 (최초 1회 또는 코드 변경 시)
#   2. docker-compose -f docker-compose.nas.yml up -d
#   3. 로그 확인: docker-compose -f docker-compose.nas.yml logs -f backend
#
# 코드 업데이트 시:
#   1. 로컬에서: docker build -t focusmate-backend:latest .
#   2. 로컬에서: docker save focusmate-backend:latest -o /tmp/focusmate-backend.tar
#   3. NAS로 전송 및 로드
#   4. docker-compose -f docker-compose.nas.yml up -d --force-recreate
# ============================================================================

version: '3.8'

services:
  # ==========================================================================
  # Backend API Server
  # ==========================================================================
  backend:
    image: focusmate-backend:latest
    container_name: focusmate-backend
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - WORKERS=${WORKERS:-2}

    volumes:
      # 로그 파일만 외부 저장
      - ./logs:/app/logs

    depends_on:
      redis:
        condition: service_healthy

    restart: unless-stopped

    networks:
      - focusmate-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================================================
  # Redis - Caching & Pub/Sub
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: focusmate-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --loglevel notice
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - focusmate-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ============================================================================
# Volumes
# ============================================================================
volumes:
  redis-data:
    driver: local

# ============================================================================
# Networks
# ============================================================================
networks:
  focusmate-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
