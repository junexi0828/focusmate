# ============================================================================
# FocusMate - Docker Compose for Synology NAS (Hybrid Deployment)
# ============================================================================
#
# 아키텍처: Hybrid (이미지 환경 + 로컬 코드)
# - Code: /volume1/web/focusmate-backend (NAS 로컬 코드 마운트) -> git pull로 업데이트
# - Env: Docker 이미지 (Python, OS 의존성)
# - Services: Backend, Redis, Cloudflare Tunnel, Log Alerter, Watchtower
#
# 사용법:
#   1. 코드 업데이트: NAS에서 'git pull' -> 'docker-compose restart backend'
#   2. 전체 재시작: 'docker-compose up -d'
# ============================================================================

version: '3.8'

services:
  # ==========================================================================
  # Backend API Server
  # ==========================================================================
  backend:
    image: focusmate-backend:latest
    container_name: focusmate-backend
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
    ports:
      - "8000:8000"
    volumes:
      # 로그만 외부 저장 (코드는 이미지에 포함)
      - ./logs:/app/logs
    environment:
      - APP_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - CLOUDFLARE_TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - DATABASE_POOL_SIZE=${DATABASE_POOL_SIZE:-20}
      - DATABASE_MAX_OVERFLOW=${DATABASE_MAX_OVERFLOW:-10}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,https://focusmate.co.kr}
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    networks:
      - focusmate-network
    # Watchdog 제거하고 Docker 관리 하에 둠
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================================================
  # Redis - Caching & Pub/Sub
  # ==========================================================================
  redis:
    image: redis:alpine
    container_name: focusmate-redis
    # 포트 매핑 제거 (내부 네트워크만 사용, 시스템 Redis 충돌 방지)
    # ports:
    #   - "6379:6379"
    volumes:
      # Synology 전용: 상대 경로 바인드 마운트 (권한 문제 해결)
      - ./redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: always
    networks:
      - focusmate-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # Cloudflare Tunnel (외부 접속)
  # ==========================================================================
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: focusmate-tunnel
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: always
    networks:
      - focusmate-network

  # ==========================================================================
  # Log Alerter (Slack 알림)
  # ==========================================================================
  log-alerter:
    image: python:3.11-slim
    container_name: focusmate-log-alerter
    volumes:
      - ./logs:/app/logs
      - ./scripts:/app/scripts
      - ./requirements.txt:/app/requirements.txt
    working_dir: /app
    # 의존성 설치 후 스크립트 실행
    command: >
      bash -c "pip install --no-cache-dir -r requirements.txt &&
               python /app/scripts/monitoring/log_alerter.py"
    environment:
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - LOG_FILE=/app/logs/app.log
    restart: always
    network_mode: "host" # 호스트 네트워크 사용 for resource monitoring

  # ==========================================================================
  # Watchtower (이미지 자동 업데이트)
  # ==========================================================================
  watchtower:
    image: containrrr/watchtower
    container_name: focusmate-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 focusmate-backend
    restart: always

# ============================================================================
# Networks
# ============================================================================
networks:
  focusmate-network:
    driver: bridge
